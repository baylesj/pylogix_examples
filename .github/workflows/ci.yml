name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: python -m pip install --upgrade "ruff>=0.15,<0.16"

      - name: Lint
        run: ruff check --output-format=github .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Runtime dependency of sync_controllogix_clock.py. The tests mock pylogix
      # and pass without it, but installing it keeps CI close to production and
      # catches real import-time breakage.
      - name: Install dependencies
        run: python -m pip install --upgrade pip pylogix

      - name: Run tests
        # Discovers every test*.py in the repository.
        run: python -m unittest discover -v -p "test*.py"
